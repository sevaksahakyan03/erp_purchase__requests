<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div id="login-section" class="card mx-auto" style="max-width: 400px;">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">Մուտք (ERP)</h3>
            <input type="email" id="email" class="form-control mb-3" placeholder="Էլ. հասցե (օր. admin@erp.com)" value="admin@erp.com">
            <input type="password" id="password" class="form-control mb-3" placeholder="Գաղտնաբառ" value="hashed_pass_1">
            <button onclick="login()" class="btn btn-primary w-100">Մուտք գործել</button>
            <div id="login-error" class="text-danger mt-2 text-center"></div>
        </div>
    </div>

    <div id="dashboard-section" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Գնումների Հարցումներ</h2>
            <button onclick="logout()" class="btn btn-outline-danger">Ելք</button>
        </div>

        <div class="card mb-4">
            <div class="card-body d-flex gap-2">
                <input type="text" id="new-title" class="form-control" placeholder="Հարցման վերնագիրը (օր. Նոր համակարգիչ)">
                <button onclick="createRequest()" class="btn btn-success text-nowrap">Ստեղծել հարցում</button>
            </div>
        </div>

        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Վերնագիր</th>
                    <th>Կարգավիճակ</th>
                    <th>Գործողություն</th>
                </tr>
            </thead>
            <tbody id="requests-table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3000';
    let token = localStorage.getItem('erp_token');

    // Ստուգում ենք՝ արդյոք արդեն լոգին եղած է
    if (token) showDashboard();

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const res = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        if (res.ok) {
            token = data.token;
            localStorage.setItem('erp_token', token);
            showDashboard();
        } else {
            document.getElementById('login-error').innerText = data.error || 'Սխալ մուտքանուն կամ գաղտնաբառ';
        }
    }

    function logout() {
        localStorage.removeItem('erp_token');
        token = null;
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('dashboard-section').style.display = 'none';
    }

    function showDashboard() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('dashboard-section').style.display = 'block';
        loadRequests();
    }

    async function loadRequests() {
        const res = await fetch(`${API_URL}/purchase-requests`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        const tbody = document.getElementById('requests-table-body');
        tbody.innerHTML = '';

        if(data.data) {
            data.data.forEach(req => {
                tbody.innerHTML += `
                    <tr>
                        <td>${req.id}</td>
                        <td>${req.title}</td>
                        <td><span class="badge bg-${getStatusColor(req.status)}">${req.status}</span></td>
                        <td>
                            ${req.status === 'Draft' ? `<button onclick="actionRequest(${req.id}, 'submit')" class="btn btn-sm btn-warning">Ուղարկել (Submit)</button>` : ''}
                            ${req.status === 'Submitted' ? `
                                <button onclick="actionRequest(${req.id}, 'approve')" class="btn btn-sm btn-success">Հաստատել</button>
                                <button onclick="actionRequest(${req.id}, 'reject')" class="btn btn-sm btn-danger">Մերժել</button>
                            ` : ''}
                        </td>
                    </tr>
                `;
            });
        }
    }

    async function createRequest() {
        const title = document.getElementById('new-title').value;
        if(!title) return alert('Խնդրում ենք գրել վերնագիր');

        await fetch(`${API_URL}/purchase-requests`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ title, description: 'Created from frontend' })
        });
        document.getElementById('new-title').value = '';
        loadRequests();
    }

    async function actionRequest(id, action) {
        const res = await fetch(`${API_URL}/purchase-requests/${id}/${action}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        if(!res.ok) alert(data.error); // Եթե Staff-ը փորձի հաստատել, այստեղ սխալ կտա
        loadRequests();
    }

    function getStatusColor(status) {
        if(status === 'Draft') return 'secondary';
        if(status === 'Submitted') return 'warning';
        if(status === 'Approved') return 'success';
        return 'danger';
    }
</script>
</body>
</html>
